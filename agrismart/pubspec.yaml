name: agrismart
description: Flutter app with Firebase authentication

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  # Image picker for profile photo
  image_picker: ^1.0.7
  # PIN code input
  pin_code_fields: ^8.0.1
  # Google Sign In
  google_sign_in: ^6.2.1
  # Sign in with Apple
  sign_in_with_apple: ^5.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
